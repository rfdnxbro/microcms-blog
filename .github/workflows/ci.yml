name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    name: lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Lint (ESLint)
        run: npm run lint
      - name: Type check (tsc)
        run: npx tsc --noEmit
